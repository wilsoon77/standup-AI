<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Nuevo Gradiente Verde Neón -->
    <linearGradient id="greenAiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF9D" />
      <stop offset="100%" stop-color="#00C875" />
    </linearGradient>
  </defs>

  <!-- ICONO CENTRALIZADO -->
  <g>
    <!-- Rama principal -->
    <path d="M 36 100 L 36 40" stroke="#64748B" stroke-width="6" stroke-linecap="round" />
    
    <!-- Commits (Nodos) -->
    <circle cx="36" cy="90" r="8" fill="#64748B" />
    <circle cx="36" cy="50" r="8" fill="#64748B" />
    
    <!-- Rama secundaria (Verde IA) -->
    <path d="M 36 90 C 76 90 76 60 76 50" stroke="url(#greenAiGradient)" stroke-width="6" fill="none" stroke-linecap="round" />
    
    <!-- Estrella de 4 puntas (Verde IA) -->
    <path d="M 76 20 Q 76 35 91 35 Q 76 35 76 50 Q 76 35 61 35 Q 76 35 76 20 Z" fill="url(#greenAiGradient)" />
  </g>
</svg>